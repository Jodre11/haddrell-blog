version: 2
updates:
    - package-ecosystem: npm
      directory: /
      schedule:
          interval: weekly
          day: monday
      open-pull-requests-limit: 5
      groups:
          prod-minor-patch:
              dependency-type: production
              update-types:
                  - minor
                  - patch
          dev-minor-patch:
              dependency-type: development
              update-types:
                  - minor
                  - patch
      ignore:
          # @astrojs/check 0.9.8 still pins typescript ^5.0.0; revisit when upstream widens its peer range.
          - dependency-name: typescript
            update-types: ['version-update:semver-major']
    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
          day: monday
      groups:
          actions:
              patterns:
                  - '*'

name: Link check (internal)

on:
    pull_request:
        paths:
            - 'src/**'
            - 'public/**'
            - 'astro.config.mjs'
            - '**/*.md'

jobs:
    internal-links:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: npm
            - run: npm ci
            - run: npm run build
            - name: Check internal links only
              uses: lycheeverse/lychee-action@v2
              with:
                  args: >-
                      --no-progress
                      --offline
                      --include-fragments
                      './dist/**/*.html'
                  fail: true

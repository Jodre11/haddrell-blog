name: CI

on:
    push:
        branches: [main]
    pull_request:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: npm
            - run: npm ci
            - run: npm run lint
            - run: npm run check
            - run: npm test
            - run: npm run build

    dependency-review:
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/dependency-review-action@v4
              with:
                  fail-on-severity: moderate
